version: "3.9"

services:
  

  redis:
   image: redis:latest
   container_name: pmt-redis
   restart: unless-stopped

   ports:
      - "6377:6379"

   networks:
      - pmt-network

  pmt:
    build:
      context: .
      dockerfile: Dockerfile
    image: pmt:latest
    container_name: pmt-app
    restart: unless-stopped

    depends_on:
      - redis

    ports:
      - "6369:6369"

    env_file:
      - env.sh

    networks:
      - pmt-network

networks:
  pmt-network:
    driver: bridge